services:
  mongodb:
    image: mongo:6
    container_name: campus_market_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    platform: linux/arm64

  redis:
    image: redis:7-alpine
    container_name: campus_market_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    platform: linux/arm64

  backend:
    build: ./backend
    container_name: campus_market_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - redis
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/campus_market?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: campus_market_jwt_secret_key_2024
      JWT_EXPIRES_IN: 7d
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    platform: linux/arm64
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: campus_market_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    platform: linux/arm64
    command: npm run dev -- --host

volumes:
  mongo_data:
  redis_data:
